<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Student Dashboard</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #e3f2fd, #fce4ec);
    }

    header {
      background-color: #1565c0;
      color: white;
      padding: 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
    }

    .profile {
      font-size: 14px;
    }

    .profile button {
      margin-left: 10px;
      background-color: #ef5350;
      border: none;
      color: white;
      padding: 5px 12px;
      border-radius: 5px;
      cursor: pointer;
    }

    main {
      padding: 30px;
    }

    .filter-section {
      margin-bottom: 20px;
    }

    .filter-section select {
      padding: 8px;
      font-size: 14px;
    }

    .issue-table-section table {
      width: 100%;
      border-collapse: collapse;
      background-color: white;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
    }

    .issue-table-section th,
    .issue-table-section td {
      padding: 12px;
      border: 1px solid #ddd;
      text-align: left;
    }

    .badge {
      padding: 5px 10px;
      border-radius: 15px;
      font-size: 12px;
      color: white;
    }

    .badge.pending {
      background-color: #fbc02d;
    }

    .badge.inprogress {
      background-color: #42a5f5;
    }

    .badge.resolved {
      background-color: #66bb6a;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome</h1>
    <div class="profile">
      <span>Student ID: S2025001</span>
      <button onclick="logout()">Logout</button>
    </div>
  </header>

  <main>
    <section class="filter-section">
      <label for="filter">Filter by Status:</label>
      <select id="filter" onchange="filterIssues()">
        <option value="all">All</option>
        <option value="Pending">Pending</option>
        <option value="In Progress">In Progress</option>
        <option value="Resolved">Resolved</option>
      </select>
    </section>

    <section class="issue-table-section">
      <table>
        <thead>
          <tr>
            <th>Issue ID</th>
            <th>Category</th>
            <th>Description</th>
            <th>Status</th>
            <th>Helper Response</th>
          </tr>
        </thead>
        <tbody id="issueTableBody">
          <!-- Sample data -->
          <tr>
            <td>ACD102</td>
            <td>Academic</td>
            <td>Marks not updated</td>
            <td><span class="badge pending">Pending</span></td>
            <td>Awaiting review</td>
          </tr>
          <tr>
            <td>MHL205</td>
            <td>Mental Health</td>
            <td>Need counseling support</td>
            <td><span class="badge inprogress">In Progress</span></td>
            <td>Assigned to counselor</td>
          </tr>
          <tr>
            <td>FNC007</td>
            <td>Financial</td>
            <td>Need help with fees</td>
            <td><span class="badge resolved">Resolved</span></td>
            <td>Support granted</td>
          </tr>
        </tbody>
      </table>
    </section>
  </main>

  <script>
    function logout() {
      alert("You have been logged out.");
      window.location.href = "loginselection.html"; // Change if needed
    }

    function filterIssues() {
      const selected = document.getElementById("filter").value;
      const rows = document.querySelectorAll("#issueTableBody tr");

      rows.forEach(row => {
        const status = row.querySelector(".badge").textContent;
        if (selected === "all" || status === selected) {
          row.style.display = "";
        } else {
          row.style.display = "none";
        }
      });
    }
  </script>
</body>
</html>
