<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Choose Your Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Poppins', sans-serif;
    }

    body {
      height: 100vh;
      background-image:
       linear-gradient(rgba(0, 0, 50, 0.6), rgba(0, 0, 50, 0.6)),
       url('https://i.pinimg.com/736x/4d/dd/cf/4dddcfc826925d62934cefdb6e331fd4.jpg');
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      color: white;
    }

    .login-container {
      text-align: center;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      padding: 50px;
      border-radius: 20px;
      box-shadow: 0 0 40px rgba(0, 204, 255, 0.4);
      animation: fadeIn 1.5s ease forwards;
    }

    h2 {
      font-size: 2.5rem;
      font-family: 'Orbitron', sans-serif;
      color: #00e6ff;
      margin-bottom: 30px;
      letter-spacing: 2px;
      text-shadow: 0 0 10px #00e6ff;
      animation: slideDown 1.5s ease;
    }

    .login-options {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .login-box a {
      display: block;
      background: linear-gradient(45deg, #00e6ff, #3b8aff);
      color: white;
      text-decoration: none;
      font-size: 1.2rem;
      font-weight: 600;
      padding: 20px 30px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 230, 255, 0.5);
      transition: all 0.3s ease;
    }

    .login-box a:hover {
      transform: scale(1.05);
      background: linear-gradient(45deg, #3b8aff, #00e6ff);
      box-shadow: 0 0 25px rgba(0, 230, 255, 0.8);
    }

    .login-box i {
      margin-bottom: 10px;
      color: #00e6ff;
      transition: transform 0.3s ease;
    }

    .login-box a:hover i {
      transform: scale(1.3);
    }

    @keyframes slideDown {
      from {
        opacity: 0;
        transform: translateY(-50px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.9);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (min-width: 768px) {
      .login-options {
        flex-direction: row;
        justify-content: center;
      }

      .login-box a {
        min-width: 200px;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <h2>Choose Your Portal</h2>
    <div class="login-options">
      <div class="login-box">
        <a href="studentlogin.html">
          <i class="fas fa-user-graduate fa-2x"></i><br>
          Login as Student
        </a>
      </div>
      <div class="login-box">
        <a href="teacherlogin.html">
          <i class="fas fa-chalkboard-teacher fa-2x"></i><br>
          Login as Teacher
        </a>
      </div>
      <div class="login-box">
        <a href="helperdashboard.html">
          <i class="fas fa-hands-helping fa-2x"></i><br>
          Login as Helper
        </a>
      </div>
    </div>
  </div>
</body>
</html>
